name: Deploy GWT to GitHub Pages

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # Собираем весь проект целиком
      run: mvn clean install -DskipTests -f mail/pom.xml

    - name: Prepare Files
      id: find_folder
      run: |
        # Результат сборки GWT обычно оказывается в target модуля mail-server в виде .war или папки
        # Находим папку сборки сервера, где лежат объединенные файлы
        BASE=$(find mail/mail-server/target -maxdepth 1 -type d -name "mail-server-*" | head -n 1)
        
        # Если есть Mail.html, делаем его копию как index.html для работы корня сайта
        if [ -f "$BASE/Mail.html" ]; then
          cp "$BASE/Mail.html" "$BASE/index.html"
        fi
        
        echo "DEPLOY_FOLDER=$BASE" >> $GITHUB_OUTPUT

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        # Публикуем содержимое папки сервера, так как там лежат и клиентские скрипты, и HTML
        folder: ${{ steps.find_folder.outputs.DEPLOY_FOLDER }}
        branch: gh-pages
        clean: true
        
