name: Deploy GWT to GitHub Pages

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # Собираем проект
      run: mvn clean install -DskipTests -f mail/pom.xml

    - name: Prepare Files for Deployment
      id: find_folder
      run: |
        # Находим папку сборки
        BASE_PATH=$(find mail/mail-client/target -maxdepth 1 -type d -name "mail-client-*" | head -n 1)
        
        # Заходим внутрь и ищем главный HTML файл (Mail.html или другой)
        # Копируем его как index.html, чтобы GitHub Pages открывал его по умолчанию
        if [ -f "$BASE_PATH/Mail.html" ]; then
          cp "$BASE_PATH/Mail.html" "$BASE_PATH/index.html"
        elif [ -f "$BASE_PATH/mail/Mail.html" ]; then
          cp "$BASE_PATH/mail/Mail.html" "$BASE_PATH/index.html"
        fi
        
        echo "DEPLOY_FOLDER=$BASE_PATH" >> $GITHUB_OUTPUT

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: ${{ steps.find_folder.outputs.DEPLOY_FOLDER }}
        branch: gh-pages
        clean: true
        
