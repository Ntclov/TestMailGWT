name: Deploy GWT to GitHub Pages

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # Мы добавляем -f mail/pom.xml, чтобы Maven знал, куда заходить
      run: mvn clean install -DskipTests -f mail/pom.xml

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        # Здесь указываем путь к папке, где GWT создаст готовый JavaScript
        # После сборки это обычно папка target внутри клиентского модуля
        folder: mail/mail-client/target/mail-client-2.13.0-SNAPSHOT
        branch: gh-pages
        
